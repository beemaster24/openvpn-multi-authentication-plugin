name: CMake Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make libssl-dev libldap2-dev pkg-config openvpn

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build
